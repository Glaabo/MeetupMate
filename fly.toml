# Example Fly.io config — set secrets: BETTER_AUTH_SECRET, DATABASE_URL, BETTER_AUTH_URL, NEXT_PUBLIC_APP_URL

app = "meetupmate"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
